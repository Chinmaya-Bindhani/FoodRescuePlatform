{% extends 'shared/base.html' %}
{% block title %}Register | Food Rescue{% endblock %}
{% block content %}
<section class="page-section">
    <div class="container">
        <div class="form-box">
            <h1>Register</h1>
            <p class="form-subtext">Create account first. After register, you go back to login.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" name="mobile" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn-dark full-btn">Register</button>
            </form>
            <p class="form-bottom">Already registered? <a href="{% url 'login' %}">Login</a></p>
        </div>
    </div>
</section>
{% endblock %}
