{% extends 'shared/base.html' %}
{% block title %}Login | Food Rescue{% endblock %}
{% block content %}
<section class="page-section">
    <div class="container">
        <div class="form-box">
            <h1>Login</h1>
            <p class="form-subtext">Use your registered email and password.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn-dark full-btn">Login</button>
            </form>
            <p class="form-bottom">Not registered? <a href="{% url 'register' %}">Register</a></p>
        </div>
    </div>
</section>
{% endblock %}
